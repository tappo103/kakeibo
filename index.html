<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="家計簿">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>家計簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; }
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 text-gray-800">

    <div id="view-input">
        <div class="bg-white shadow-sm sticky top-0 z-10">
            <div class="text-center py-2 border-b border-gray-50"><h1 class="text-sm font-bold text-gray-600">家計簿：入力</h1></div>
            <div class="flex justify-center space-x-4 p-4">
                <button id="type-expense" onclick="setType('支出')" class="px-8 py-2 rounded-full bg-red-100 text-red-600 font-bold transition-all">支出</button>
                <button id="type-income" onclick="setType('収入')" class="px-8 py-2 rounded-full bg-gray-100 text-gray-400 font-bold transition-all">収入</button>
            </div>
        </div>
        <div class="p-4 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <label class="text-[10px] text-gray-400 block mb-1 uppercase tracking-wider">Amount</label>
                <div class="flex items-end justify-between border-b border-gray-100 pb-2">
                    <span id="currency-unit" class="text-2xl font-bold text-red-400 mr-2">¥</span>
                    <input type="number" id="amount" inputmode="numeric" placeholder="0" class="w-full text-4xl font-bold outline-none text-right bg-transparent">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-3 rounded-xl shadow-sm">
                    <label class="text-[10px] text-gray-400 block mb-1">日付</label>
                    <input type="date" id="date" class="w-full text-sm outline-none font-medium">
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm">
                    <label class="text-[10px] text-gray-400 block mb-1">メモ</label>
                    <input type="text" id="memo" placeholder="詳細を入力" class="w-full text-sm outline-none">
                </div>
            </div>
            <div class="space-y-3">
                <div class="flex space-x-2 overflow-x-auto pb-1 no-scrollbar" id="category-groups"></div>
                <div id="category-list" class="category-grid"></div>
            </div>
        </div>
    </div>

    <div id="view-report" class="hidden">
        <div class="bg-white shadow-sm sticky top-0 z-10 p-4">
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeMonth(-1)" class="p-2 text-gray-400 text-xl font-bold">〈</button>
                <h2 id="report-month" class="text-lg font-bold">2026年3月</h2>
                <button onclick="changeMonth(1)" class="p-2 text-gray-400 text-xl font-bold">〉</button>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-blue-50 p-2 rounded-xl"><p class="text-[10px] text-blue-500">収入</p><p id="total-income" class="font-bold text-sm">¥0</p></div>
                <div class="bg-red-50 p-2 rounded-xl"><p class="text-[10px] text-red-500">支出</p><p id="total-expense" class="font-bold text-sm">¥0</p></div>
                <div class="bg-gray-100 p-2 rounded-xl"><p class="text-[10px] text-gray-500">収支</p><p id="total-balance" class="font-bold text-sm">¥0</p></div>
            </div>
        </div>
        <div id="report-content" class="p-4 space-y-2">
            </div>
    </div>

    <div id="modal-detail" class="fixed inset-0 bg-black/50 hidden z-50 flex items-end">
        <div class="bg-white w-full rounded-t-3xl max-h-[80vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="modal-title" class="font-bold text-lg">カテゴリー詳細</h3>
                <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="modal-list" class="space-y-4"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 shadow-lg z-20">
        <button onclick="showView('input')" id="nav-input" class="flex flex-col items-center text-blue-500">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            <span class="text-[10px] font-bold mt-1">入力</span>
        </button>
        <button onclick="showView('report')" id="nav-report" class="flex flex-col items-center text-gray-300">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[10px] font-bold mt-1">レポート</span>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzrPsU4slE5geo43NSNngqEfI-d05_46WjfzC29CfWBYtB_04WYib8ke5HCg1i22b7l1Q/exec";
        
        const expenseCategories = ["食費(毎変)","日用品(毎変)","交通費(毎変)","趣味·娯楽(毎変)","教養・教育(毎変)","衣服・美容(毎変)","健康・医療(毎変)","水道光熱費(毎変)","交際費(毎変)","経費(毎変)","自動車(毎変)","特別な支出(不変)","趣味・娯楽(不変)","健康・医療(不変)","衣服・美容(不変)","家具・家電(不変)","住宅(不変)","経費(不変)","教養・教育(不変)","自動車(不変)","サブスク費(毎固)","通信費(毎固)","住宅(毎固)","保険(毎固)","教養・教育(毎固)","自動車(毎固)","経費(毎固)","健康・医療(不固)","自動車(不固)","住宅(不固)","サブスク費(不固)","経費(不固)"];
        const incomeCategories = ["給料", "副業", "その他"];

        let currentType = "支出";
        let displayDate = new Date();
        let rawData = [];

        window.onload = () => {
            document.getElementById('date').valueAsDate = new Date();
            updateUI();
        };

        function showView(view) {
            document.getElementById('view-input').classList.toggle('hidden', view !== 'input');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-input').classList.toggle('text-blue-500', view === 'input');
            document.getElementById('nav-input').classList.toggle('text-gray-300', view !== 'input');
            document.getElementById('nav-report').classList.toggle('text-blue-500', view === 'report');
            document.getElementById('nav-report').classList.toggle('text-gray-300', view !== 'report');
            if (view === 'report') fetchAndRenderReport();
        }

        async function fetchAndRenderReport() {
            document.getElementById('report-content').innerHTML = "<p class='text-center text-gray-400 py-10'>データ読み込み中...</p>";
            try {
                const response = await fetch(API_URL);
                rawData = await response.json();
                renderReport();
            } catch (e) {
                document.getElementById('report-content').innerHTML = "<p class='text-center text-red-400 py-10'>読み込み失敗。GASの設定を確認してください。</p>";
            }
        }

        function renderReport() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            document.getElementById('report-month').innerText = `${year}年${month + 1}月`;

            // 当月データの抽出（ヘッダー行を飛ばす）
            const filtered = rawData.slice(1).filter(row => {
                const d = new Date(row[0]);
                return d.getFullYear() === year && d.getMonth() === month;
            });

            let income = 0, expense = 0;
            const summary = {};

            filtered.forEach(row => {
                const amt = Number(row[2]);
                const cat = row[1];
                if (amt > 0) income += amt; else expense += Math.abs(amt);
                summary[cat] = (summary[cat] || 0) + Math.abs(amt);
            });

            document.getElementById('total-income').innerText = `¥${income.toLocaleString()}`;
            document.getElementById('total-expense').innerText = `¥${expense.toLocaleString()}`;
            document.getElementById('total-balance').innerText = `¥${(income - expense).toLocaleString()}`;

            const sortedCats = Object.keys(summary).sort((a, b) => summary[b] - summary[a]);
            const container = document.getElementById('report-content');
            container.innerHTML = sortedCats.map(cat => `
                <div onclick="showDetail('${cat}')" class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center active:scale-95 transition-all">
                    <div>
                        <p class="text-xs font-bold text-gray-500">${cat}</p>
                        <div class="w-32 bg-gray-100 h-1 rounded-full mt-1">
                            <div class="bg-blue-400 h-1 rounded-full" style="width: ${Math.min(100, (summary[cat] / (income || expense)) * 100)}%"></div>
                        </div>
                    </div>
                    <p class="font-bold text-sm">¥${summary[cat].toLocaleString()}</p>
                </div>
            `).join('') || "<p class='text-center text-gray-300 py-10'>データがありません</p>";
        }

function showDetail(cat) {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            const filtered = rawData.slice(1).filter(row => {
                const d = new Date(row[0]);
                return d.getFullYear() === year && d.getMonth() === month && row[1] === cat;
            }).sort((a, b) => new Date(b[0]) - new Date(a[0]));

            document.getElementById('modal-title').innerText = cat;
            document.getElementById('modal-list').innerHTML = filtered.map(row => `
                <div class="border-b border-gray-50 pb-3">
                    <div class="flex justify-between items-start mb-1">
                        <div>
                            <p class="text-[10px] text-gray-400">${new Date(row[0]).toLocaleDateString()}</p>
                            <p class="text-sm font-medium">${row[3] || '（メモなし）'}</p>
                        </div>
                        <p class="font-bold text-sm">¥${Math.abs(row[2]).toLocaleString()}</p>
                    </div>
                    <div class="flex justify-end space-x-4 text-[10px] font-bold">
                        <button onclick="editEntry('${row[6]}', '${row[0]}', '${row[1]}', '${row[2]}', '${row[3]}', '${row[4]}')" class="text-blue-500">編集</button>
                        <button onclick="deleteEntry('${row[6]}')" class="text-red-400">削除</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('modal-detail').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-detail').classList.add('hidden'); }
        function changeMonth(diff) { displayDate.setMonth(displayDate.getMonth() + diff); renderReport(); }
        function setType(type) { currentType = type; updateUI(); }

        function updateUI() {
            const isExp = currentType === "支出";
            document.getElementById('type-expense').className = isExp ? "px-8 py-2 rounded-full bg-red-100 text-red-600 font-bold transition-all" : "px-8 py-2 rounded-full bg-gray-100 text-gray-400 font-bold transition-all";
            document.getElementById('type-income').className = !isExp ? "px-8 py-2 rounded-full bg-blue-100 text-blue-600 font-bold transition-all" : "px-8 py-2 rounded-full bg-gray-100 text-gray-400 font-bold transition-all";
            document.getElementById('currency-unit').className = isExp ? "text-2xl font-bold text-red-400 mr-2" : "text-2xl font-bold text-blue-400 mr-2";
            if (isExp) { renderCategoryGroups(); renderCategories("毎変"); } else { document.getElementById('category-groups').innerHTML = ""; renderIncomeCategories(); }
        }

        function renderCategoryGroups() {
            const groups = ["毎変", "不変", "毎固", "不固"];
            document.getElementById('category-groups').innerHTML = groups.map(g => `<button onclick="renderCategories('${g}')" class="whitespace-nowrap px-5 py-2 rounded-full bg-white border border-gray-100 shadow-sm text-xs font-bold text-gray-500 active:bg-gray-800 active:text-white transition-all">${g}</button>`).join('');
        }

        function renderCategories(filter) {
            const filtered = expenseCategories.filter(c => c.includes(filter));
            document.getElementById('category-list').innerHTML = filtered.map(c => `<button onclick="register('${c}')" class="p-3 bg-white border border-gray-50 rounded-2xl text-[11px] font-bold text-gray-700 shadow-sm active:bg-red-500 active:text-white active:scale-95 transition-all">${c.replace(`(${filter})`, '')}</button>`).join('');
        }

        function renderIncomeCategories() {
            document.getElementById('category-list').innerHTML = incomeCategories.map(c => `<button onclick="register('${c}')" class="p-3 bg-white border border-gray-50 rounded-2xl text-[11px] font-bold text-gray-700 shadow-sm active:bg-blue-500 active:text-white active:scale-95 transition-all">${c}</button>`).join('');
        }

        async function register(category) {
            const amountInput = document.getElementById('amount');
            const memoInput = document.getElementById('memo');
            if (!amountInput.value) { alert("金額を入力してください"); return; }
            const data = {
                date: document.getElementById('date').value.replace(/-/g, '/'),
                category: category,
                amount: currentType === "支出" ? -Math.abs(amountInput.value) : Math.abs(amountInput.value),
                memo: memoInput.value,
                type: currentType,
                isFixed: category.includes("固") ? 1 : 0
            };
            amountInput.value = ""; memoInput.value = "";
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                if (res.ok) alert("登録しました！");
            } catch (e) { alert("登録失敗"); }
        }

        // 追加した関数
        async function deleteEntry(id) {
            if (!confirm("この項目を削除しますか？")) return;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', id: id })
                });
                if (res.ok) {
                    alert("削除しました");
                    closeModal();
                    fetchAndRenderReport();
                }
            } catch (e) { alert("削除に失敗しました"); }
        }

        function editEntry(id, date, cat, amt, memo, type) {
            showView('input');
            document.getElementById('date').value = new Date(date).toISOString().split('T')[0];
            document.getElementById('amount').value = Math.abs(amt);
            document.getElementById('memo').value = memo;
            setType(type);
            alert("値を修正して、再度カテゴリーをタップして登録してください。\n※古いデータは「削除」ボタンで消してください。");
            closeModal();
        }
    </script>
</body>
</html>
